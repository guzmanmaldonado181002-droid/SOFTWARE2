<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">

    <title>Contacto | Playas de Guatemala</title>

    <link rel="stylesheet" href="assets/css/normalize.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/script.js" defer></script>
</head>
<body>

<header>
    <h1 class="nombre-sitio">Playas de <span>Guatemala</span></h1>
</header>

    <div class="contenedor-navegacion">
        <div class="contenedor">
            <div class="menu-toggle">
                ☰
            </div>
            <nav class="navegacion-principal">
                <a class="enlace" href="index.html">Inicio</a>
                <a class="enlace" href="playas.html">Playas</a>
                <a class="enlace" href="contacto.html">Contacto</a>
            </nav>

    </div>
</div>
<main class="contenedor contenido-principal">
    <h2 class="text-center">Contáctanos</h2>

    <form class="formulario">
        <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
        </div>

        <div class="campo">
            <label for="region">Región de interés</label>
            <select id="region">
                <option value="">-- Selecciona --</option>
                <option value="pacifico">Pacífico</option>
                <option value="caribe">Caribe</option>
                <option value="naturales">Naturales</option>
            </select>
        </div>

        <div class="campo">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="5" placeholder="Escribe tu consulta aquí..." required></textarea>
        </div>

        <div class="campo">
            <input type="submit" value="Enviar" class="btn btn-enviar">
        </div>
    </form>
</main>

<footer class="site-footer">
    <p class="text-center">
        &copy; 2026 Playas de Guatemala · Proyecto Académico
    </p>
</footer>

</body>
</html>
